name: Tests

on:
  push:

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check if we are able to start the app, and if the page contains the expected content
        timeout-minutes: 3
        run: |
          # Start the app in the background, and check if it serves the expected content
          npm start &
          curl -s http://localhost:3000 | grep "Graph Explorer"

          # Kill the app after the test
          pkill -f "npm start"
